<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Users</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 4vw;
            justify-content: space-around;
            margin: 5vw;

        }

        .card {
            background-color: #1e1e1e;
    border-radius: 15px;
    box-shadow: 0 0 10px #3678b9;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 20vw;
            height: 25vw;
            gap: 3vw;
            transition: all 0.3s ease;
        }
        .card:hover {
    transform: translateY(-10px) scale(1.03); 
}

        img {
            width: 100%;
            height: 60%;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;

        }

        a {
            color: #4da6ff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="loading" class="loading">Loading users...</div>
    <div id="container" class="container"> </div>
    <script>
        let container = document.getElementById('container');
        let loadingDiv = document.getElementById('loading');

        fetch('https://api.github.com/users')
            .then(res => res.json())// "res" is the return of the fetch (json), we parse it into an object
            .then(users => { //"users" is the object , we got it from parsing res into object
                loadingDiv.style.display = 'none';


                users.slice(0, 10).forEach(user => {
                    let div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
          <img src="${user.avatar_url}">
            <strong>${user.login}</strong>
           <a href="${user.html_url}"> view profile </a>
          `;
                    container.appendChild(div);
                });
            })
            .catch(err => {
                loadingDiv.textContent = 'Failed to load users.';
                console.error(err);
            });


    </script>
</body>

</html>
