<head>

    <title>task4-1</title>
    <style>
        body {
            display: grid;
            grid-template-rows: 2fr 3fr;
        }

        .row1 {
            height: 200px;
            background-color: #963F00;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .row2 {
            height: 300px;
            background-color: #DAA252;
            display: flex;
            flex-direction: column;
        }

        .nav {
            display: flex;
            justify-content: center;
            color: #29720F;
            gap: 20px;
            margin-top: 10px;
        }
        
    </style>
</head>

<body>
    <div class="row1">
        <h1>THIS IS MY BANNER TEXT</h1>
    </div>
    <div class="row2">
        <span class="nav"> <span>HOME </span> <span>INFO </span><span>CONTACT </span><span>HUBPAGE </span></span>
        <span>
            <h2>This Is My Paragraph Header </h2>

            <p style="color: #752F1F;">This is where I am can place even more information about my website.</p>
            <p >This is where I can place a copyright logo like this</p>
        </span>
      
    </div>
</body>
