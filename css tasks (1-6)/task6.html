<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task 6</title>
    <style>
        .container {
            background-color: aliceblue;
            display: grid;
            grid-template-columns: 3fr 3fr;
            grid-template-rows: 3fr;
            height: 500px;
            justify-content: center;
            color: white;

        }

        #first {
            background-color: orange;
            display: grid;
            place-items: center;

        }

        #second {
            display: grid;
            place-items: center;
            background-color: blue;
        }

        /* second container */
        .container2 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 3fr 3fr 3fr;
            gap: 2px;


        }

        img {
            width: 400px;
            height: 200px;
        }

        /*  third cont  */
        .cont3 {
            display: grid;
            padding: 3px;
            background-color: goldenrod;
            color: white;
            grid-template-columns: repeat(4, 3fr);
            grid-template-rows: repeat(3, 3fr);
            height: 500px;
            font-size: 500%;
            align-content: center;
            justify-content: center;
        }

        .cont3-box {
            display: grid;
            place-items: center;
        }

        /* 4 cont */
        .cont4{
            display: grid;
            grid-template-columns: repeat(3, 3fr);
            grid-template-rows: 1fr 3fr 2fr;
        height: 500px;}

        #cont4-1{
            grid-column: 1/4;
        }
        #cont4-2{
            grid-column: 1/3;
        }
        #cont4-4{
            grid-column: 1/4;
        }

        /* 5 cont */
        .cont5{
            display: grid;
            grid-template-columns: repeat(9,1fr);
            height: 500px;
            color: white;
             font-size: 500%;
            justify-content: center;
            padding: 4px;
            background-color: goldenrod;
         
        }
    </style>
</head>

<body>
