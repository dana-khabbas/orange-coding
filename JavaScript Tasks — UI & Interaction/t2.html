<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            width: 150px;
            height: 100px;
        }
    </style>
</head>
<body>
    <select id="flags" name="flags" >
    <option value="jordan">Jordan</option>
    <option value="pales">Palestine</option>

  </select>
  <img> 
  <script>
    let flag=document.getElementById("flags");
    let img=document.getElementsByTagName("img")[0];
    flag.addEventListener("click",(e)=>{
        if(e.currentTarget.value=="jordan"){
            img.src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Flag_of_Jordan.svg"
        }
        else if(e.currentTarget.value=="pales"){
            img.src="https://palembeg.ps/sites/default/files/inline-images/pal_flag_0.png"
        }
    })
  </script>
</body>
</html>
