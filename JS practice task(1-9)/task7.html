<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let x = Number(prompt("enter any number"));

        if (x % 2 == 0) {
            alert(`the number ${x} is Even`);
        }
        else { alert(`the number ${x} is Odd`); }
    </script>
</body>

</html>
